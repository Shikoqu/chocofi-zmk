# Chocofi (built as a Corne) firmware config

# Mouse / pointer emulation — needed for the &mmv and &msc keys on the Nav layer
CONFIG_ZMK_POINTING=y

# Optional: smoother (higher-resolution) mouse scrolling
# CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Corne has an OLED option; Chocofi has no display by default.
# CONFIG_ZMK_DISPLAY=y

# Uncomment to enable RGB underglow (if your build has LEDs)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
